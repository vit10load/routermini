services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: always
    environment:
      POSTGRES_DB: routermini
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d routermini"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./backend/routermini-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: routermini
      JWT_SECRET: routermini_dev_secret
      JWT_EXPIRES_IN: 1d
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    develop:
      watch:
        - action: sync
          path: ./backend/routermini-api/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/routermini-api/package.json
  frontend:
    build:
      context: ./frontend/routermini-web
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_GRAPHQL_URL: http://localhost:3000/graphql
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    develop:
      watch:
        - action: sync
          path: ./frontend/routermini-web/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/routermini-web/package.json
volumes:
  postgres_data: